name: Reproduce attachment URL behavior

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        run: |
          git init .
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git fetch --depth=1 origin "$GITHUB_REF"
          git checkout --detach "$GITHUB_SHA"

      - name: Start local StoatChat stack
        run: docker compose up -d

      - name: Show local stack
        run: docker compose ps

      - name: Run local PoC
        run: |
          mkdir -p out
          python3 scripts/repro.py | tee out/repro.log

      - name: Summarize result
        if: always()
        run: |
          if [ -f out/result.json ]; then
            {
              echo "## StoatChat attachment URL PoC"
              echo
              echo '```json'
              python3 -m json.tool out/result.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300

      - name: Stop local stack
        if: always()
        run: docker compose down -v
