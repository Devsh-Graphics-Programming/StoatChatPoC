name: stoat-attachment-poc

services:
  redis:
    image: eqalpha/keydb:latest
    ports:
      - "${POC_REDIS_PORT:-18179}:6379"

  database:
    image: mongo:latest
    ports:
      - "${POC_MONGO_PORT:-18117}:27017"
    volumes:
      - ./data/db:/data/db
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  rabbit:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: rabbituser
      RABBITMQ_DEFAULT_PASS: rabbitpass
    ports:
      - "${POC_RABBIT_PORT:-18172}:5672"
      - "${POC_RABBIT_UI_PORT:-18173}:15672"
    volumes:
      - ./data/rabbit:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioautumn
      MINIO_ROOT_PASSWORD: minioautumn
    ports:
      - "${POC_MINIO_PORT:-18109}:9000"
      - "${POC_MINIO_UI_PORT:-18110}:9001"
    volumes:
      - ./data/minio:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioautumn minioautumn >/dev/null 2>&1; do
        echo 'Waiting for minio...' && sleep 1;
      done;
      /usr/bin/mc mb --ignore-existing local/revolt-uploads;
      "

  api:
    image: ghcr.io/stoatchat/api:${STOAT_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - database
      - redis
      - rabbit
    ports:
      - "${POC_API_PORT:-18182}:14702"
    volumes:
      - ./Revolt.toml:/Revolt.toml:ro
    environment:
      RUST_LOG: info

  file-server:
    image: ghcr.io/stoatchat/file-server:${STOAT_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - database
      - redis
      - minio
      - createbuckets
    ports:
      - "${POC_MEDIA_PORT:-18184}:14704"
    volumes:
      - ./Revolt.toml:/Revolt.toml:ro
    environment:
      RUST_LOG: info
